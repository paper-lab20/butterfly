<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butterflies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:monospace}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0.85}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#status{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5)}
#status.active{color:rgba(255,200,255,.95)}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,.7);font-size:11px;letter-spacing:.2em;text-transform:uppercase;background:rgba(0,0,0,0.7);padding:30px;border-radius:12px}
.spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.15);border-top-color:rgba(255,180,255,.8);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="status">Zeig deine Hände!</div>
<div id="loading"><div class="spinner"></div>Kamera wird gestartet…</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status');
const loadingEl=document.getElementById('loading');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let handData=[];
const TIPS=[4,8,12,16,20];

// Schmetterlings-Farben
const COLORS=[
  ['#ff6eb4','#ff1493','#ffb6e0'],
  ['#bf80ff','#8000ff','#e0b0ff'],
  ['#ffaa00','#ff6600','#ffe0a0'],
  ['#00e5ff','#0080ff','#b0f0ff'],
  ['#80ff80','#00cc44','#ccffcc'],
];

class Butterfly {
  constructor(){
    this.reset();
  }
  reset(){
    this.x=Math.random()*W;
    this.y=Math.random()*H;
    this.tx=this.x; this.ty=this.y;
    this.vx=0; this.vy=0;
    this.wing=0;
    this.wingSpeed=0.12+Math.random()*0.08;
    this.wingDir=1;
    this.size=14+Math.random()*18;
    this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
    this.angle=Math.random()*Math.PI*2;
    this.attracted=false;
    this.attractTo=null;
  }

  update(targets){
    // Finde nächstes Ziel
    let closest=null, minDist=Infinity;
    for(const t of targets){
      const dx=t.x-this.x, dy=t.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<minDist){minDist=d;closest=t;}
    }

    if(closest&&minDist<250){
      // Fliege zur Hand
      this.tx=closest.x+(Math.random()-0.5)*60;
      this.ty=closest.y+(Math.random()-0.5)*60;
      this.attracted=true;
    } else {
      // Freies Flattern
      if(Math.random()<0.01){
        this.tx=Math.random()*W;
        this.ty=Math.random()*H;
      }
      this.attracted=false;
    }

    // Smooth bewegung
    this.vx+=(this.tx-this.x)*0.04;
    this.vy+=(this.ty-this.y)*0.04;
    this.vx*=0.88; this.vy*=0.88;
    this.x+=this.vx; this.y+=this.vy;

    // Flügelschlag
    this.wing+=this.wingSpeed*(this.attracted?1.5:1);

    // Winkel zur Bewegungsrichtung
    if(Math.abs(this.vx)>0.5||Math.abs(this.vy)>0.5){
      this.angle=Math.atan2(this.vy,this.vx);
    }
  }

  draw(ctx){
    const wingOpen=Math.abs(Math.sin(this.wing));
    const s=this.size;
    const [c1,c2,c3]=this.color;

    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle+Math.PI/2);

    // Linker Flügel oben
    ctx.save();ctx.scale(-wingOpen,1);
    ctx.shadowBlur=18;ctx.shadowColor=c1;
    ctx.fillStyle=c1;ctx.globalAlpha=0.85;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-s*1.2,-s*0.3,-s*1.5,-s*1.2,-s*0.3,-s*1.1);
    ctx.bezierCurveTo(-s*0.1,-s*1.0,0,-s*0.5,0,0);
    ctx.fill();
    // Unterer Flügel links
    ctx.fillStyle=c2;ctx.globalAlpha=0.75;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-s*1.0,s*0.2,-s*1.1,s*0.9,-s*0.2,s*0.8);
    ctx.bezierCurveTo(-s*0.1,s*0.7,0,s*0.3,0,0);
    ctx.fill();
    ctx.restore();

    // Rechter Flügel oben
    ctx.save();ctx.scale(wingOpen,1);
    ctx.shadowBlur=18;ctx.shadowColor=c1;
    ctx.fillStyle=c1;ctx.globalAlpha=0.85;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(s*1.2,-s*0.3,s*1.5,-s*1.2,s*0.3,-s*1.1);
    ctx.bezierCurveTo(s*0.1,-s*1.0,0,-s*0.5,0,0);
    ctx.fill();
    // Unterer Flügel rechts
    ctx.fillStyle=c2;ctx.globalAlpha=0.75;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(s*1.0,s*0.2,s*1.1,s*0.9,s*0.2,s*0.8);
    ctx.bezierCurveTo(s*0.1,s*0.7,0,s*0.3,0,0);
    ctx.fill();
    ctx.restore();

    // Körper
    ctx.globalAlpha=1;
    ctx.shadowBlur=8;ctx.shadowColor=c3;
    ctx.fillStyle=c3;
    ctx.beginPath();
    ctx.ellipse(0,0,s*0.1,s*0.55,0,0,Math.PI*2);
    ctx.fill();

    // Fühler
    ctx.shadowBlur=4;
    ctx.strokeStyle=c3;ctx.lineWidth=1;ctx.globalAlpha=0.8;
    ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.quadraticCurveTo(-s*0.4,-s*1.2,-s*0.3,-s*1.4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.quadraticCurveTo(s*0.4,-s*1.2,s*0.3,-s*1.4);ctx.stroke();
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.arc(-s*0.3,-s*1.4,s*0.08,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(s*0.3,-s*1.4,s*0.08,0,Math.PI*2);ctx.fill();

    ctx.restore();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
}

// 25 Schmetterlinge
const butterflies=Array.from({length:25},()=>new Butterfly());

function getTargets(){
  const targets=[];
  for(const hand of handData){
    for(const ti of TIPS){
      targets.push({x:hand[ti].x*W, y:hand[ti].y*H});
    }
  }
  return targets;
}

function drawHandSkeleton(){
  for(const hand of handData){
    const C=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;
    for(const[a,b]of C){ctx.beginPath();ctx.moveTo(hand[a].x*W,hand[a].y*H);ctx.lineTo(hand[b].x*W,hand[b].y*H);ctx.stroke();}
    for(const ti of TIPS){
      ctx.shadowBlur=15;ctx.shadowColor='rgba(255,180,255,0.9)';
      ctx.fillStyle='rgba(255,220,255,0.95)';
      ctx.beginPath();ctx.arc(hand[ti].x*W,hand[ti].y*H,6,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
  }
}

function render(){
  ctx.clearRect(0,0,W,H);

  const targets=getTargets();
  for(const b of butterflies) b.update(targets);
  for(const b of butterflies) b.draw(ctx);

  drawHandSkeleton();
  requestAnimationFrame(render);
}

async function init(){
  try{
    loadingEl.innerHTML='<div class="spinner"></div>Bitte Kamera erlauben…';
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'},audio:false});
    video.srcObject=stream;
    await new Promise(r=>video.onloadedmetadata=r);
    loadingEl.innerHTML='<div class="spinner"></div>Hand Tracking lädt…';

    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.75,minTrackingConfidence:.65});
    hands.onResults(r=>{
      handData=(r.multiHandLandmarks||[]).map(lm=>lm.map(p=>({x:1-p.x,y:p.y})));
      statusEl.textContent=handData.length>0?'🦋 Schmetterlinge folgen dir!':'Zeig deine Hände!';
      statusEl.className=handData.length>0?'active':'';
    });

    const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:1280,height:720});
    await cam.start();
    loadingEl.style.display='none';
    render();
  }catch(e){
    loadingEl.innerHTML='<p style="color:rgba(255,100,100,.8);line-height:2">❌ Kamera-Zugriff verweigert.<br>Bitte erlaube die Kamera<br>und lade die Seite neu.</p>';
  }
}
init();
</script>
</body>
</html>
